<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=./7/" />
    <title>SERP - Redirecionando</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f8fafc;
        color: #1e293b;
        text-align: center;
        padding: 1rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top-color: #1a365d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      a {
        color: #1a365d;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="spinner" aria-hidden="true"></div>
    <p>Redirecionando para o formulário do 7º período...</p>
    <p>Se não for redirecionado automaticamente, <a href="./7/">clique aqui</a>.</p>
  </body>
</html>
